name: CI

on:
  push:
    branches: [main, "donnie/features"]
  pull_request:
    branches: [main, "donnie/features"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --workspace --exclude hamr-gtk

      - name: Clippy (pedantic)
        run: cargo clippy --workspace --exclude hamr-gtk -- -W clippy::pedantic

      - name: Run tests
        run: cargo test --workspace --exclude hamr-gtk

      - name: Smoke-test plugins
        run: ./scripts/smoke-test-plugins.sh

  msrv:
    name: Check MSRV (1.88)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            pkg-config

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Check compilation
        run: cargo check --workspace --exclude hamr-gtk
