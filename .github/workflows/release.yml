# Release Workflow
#
# Before triggering a release, complete the manual steps in:
# docs/releases/checklist.md
#
# This workflow is triggered by:
# - Pushing a tag matching 'v*' (e.g., v0.1.0)
# - Manual dispatch with an explicit tag input

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      ref: ${{ steps.release.outputs.ref }}
      is_latest: ${{ steps.latest.outputs.is_latest }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::release tag is required"
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "::error::release tag must start with v"
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Determine latest release flag
        id: latest
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import subprocess

          tag = os.environ["RELEASE_TAG"]
          repo = os.environ["REPOSITORY"]
          semver = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")

          current_match = semver.match(tag)
          if current_match is None:
              raise SystemExit(f"unsupported release tag format: {tag}")

          current_version = tuple(int(part) for part in current_match.groups())

          refs = subprocess.check_output(
              [
                  "git",
                  "ls-remote",
                  "--tags",
                  "--refs",
                  f"https://github.com/{repo}.git",
                  "v*",
              ],
              text=True,
          )

          remote_versions = []
          for line in refs.splitlines():
              ref = line.split()[-1]
              remote_tag = ref.rsplit("/", 1)[-1]
              match = semver.match(remote_tag)
              if match is not None:
                  remote_versions.append(tuple(int(part) for part in match.groups()))

          highest_version = max(remote_versions + [current_version])
          is_latest = current_version == highest_version

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"is_latest={'true' if is_latest else 'false'}\n")

          print(
              f"release {tag} latest flag: {is_latest} (highest observed v{'.'.join(map(str, highest_version))})"
          )
          PY

      - name: Verify Cargo.toml matches release tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          cargo_version = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))["workspace"]["package"]["version"]
          if cargo_version != release_version:
              raise SystemExit(
                  f"Cargo.toml version {cargo_version} does not match release tag version {release_version}"
              )
          print(f"verified Cargo.toml version {cargo_version} matches tag")
          PY

  build-linux-x86_64:
    name: Build Linux x86_64
    needs: [prepare-release]
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            rust \
            gtk4 \
            gtk4-layer-shell \
            pkgconf

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Generate plugin checksums
        run: ./scripts/generate-plugin-checksums.sh

      - name: Create archive
        run: |
          mkdir -p dist/hamr-linux-x86_64
          cp target/release/hamr dist/hamr-linux-x86_64/
          cp target/release/hamr-daemon dist/hamr-linux-x86_64/
          cp target/release/hamr-gtk dist/hamr-linux-x86_64/
          cp target/release/hamr-tui dist/hamr-linux-x86_64/
          cp -r plugins dist/hamr-linux-x86_64/
          cp README.md LICENSE dist/hamr-linux-x86_64/ 2>/dev/null || true
          cd dist && tar -czvf hamr-linux-x86_64.tar.gz hamr-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hamr-linux-x86_64
          path: dist/hamr-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: [prepare-release, build-linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hamr-linux-x86_64
          path: dist

      - name: Create checksums
        working-directory: dist
        run: |
          sha256sum hamr-linux-x86_64.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
           tag_name: ${{ needs.prepare-release.outputs.tag }}
           name: Hamr ${{ needs.prepare-release.outputs.tag }}
           draft: false
           make_latest: ${{ needs.prepare-release.outputs.is_latest }}
           generate_release_notes: true
           files: |
             dist/hamr-linux-x86_64.tar.gz
             dist/checksums.txt
